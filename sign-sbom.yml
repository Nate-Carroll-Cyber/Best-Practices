# =============================================================================
#  Sign SBOM (keyless, GitHub Actions workload identity)
# =============================================================================
#
#  WHAT THIS DOES
#  --------------
#  On a manual click, this workflow:
#    1. Pulls your repo's SBOM straight from GitHub's Dependency Graph export
#       (the same SPDX 2.3 JSON you can download by hand).
#    2. Signs it with Sigstore cosign — keyless. No key to store or protect.
#       The signer identity is THIS WORKFLOW (not a person). Authentication
#       uses the ambient GitHub OIDC token, which is why the job below sets
#       `permissions: id-token: write`.
#    3. Uploads the SBOM + its detached signature bundle as a build artifact.
#
#  HOW TO INSTALL
#  --------------
#    Put this file in your repo at EXACTLY this path:
#        .github/workflows/sign-sbom.yml
#    Easiest way: on github.com -> Add file -> Create new file, then type
#    ".github/workflows/sign-sbom.yml" as the name (each "/" makes a folder),
#    paste this content, and commit. No local git or tooling required.
#
#  HOW TO RUN
#  ----------
#    Repo -> Actions tab -> "Sign SBOM (keyless, workload identity)" in the
#    left sidebar -> "Run workflow" button. When it finishes, download the
#    "signed-sbom" artifact from the bottom of the run page.
#
#  HOW TO VERIFY THE SIGNATURE (optional, run locally after downloading)
#  --------------------------------------------------------------------
#    Requires cosign locally:  brew install cosign
#
#    This file is repo-agnostic — the workflow body uses ${{ github.repository }},
#    so the SAME file works unchanged in any repo. Only the verify command needs
#    to know which repo/workflow signed it. Set OWNER and REPO for the repo you
#    ran it in (or hardcode the full path). The --certificate-identity-regexp
#    below matches ANY branch or tag, so you don't have to edit a ref suffix:
#
#      OWNER=<your-org-or-user>
#      REPO=<your-repo>
#      cosign verify-blob-attestation \
#        --bundle sbom.spdx.json.sigstore.json \
#        --new-bundle-format --type spdxjson \
#        --certificate-identity-regexp \
#          "^https://github.com/${OWNER}/${REPO}/\.github/workflows/sign-sbom\.yml@refs/.*$" \
#        --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#        sbom.spdx.json
#
#    The signer identity is always:
#      https://github.com/<OWNER>/<REPO>/.github/workflows/sign-sbom.yml@refs/heads/<branch>
#    Use --certificate-identity (exact) instead of the regexp if you want to
#    pin verification to one specific branch or tag.
#
#  SECURITY NOTES
#  --------------
#    * No secrets live in this file. `github.token` and the OIDC token are
#      injected by GitHub at runtime; they are never stored in the repo.
#    * The trust boundary is WHO CAN EDIT THIS FILE. Anyone who can merge a
#      change to it on `main` can change what is signed under this identity.
#      Protect `main` with required reviews / branch protection.
#    * Third-party actions below are PINNED to commit SHAs (not moving tags)
#      so a compromised or re-pointed tag cannot swap the tool underneath you.
#      Version each SHA maps to is noted in the trailing comment. To update,
#      bump to a newer release's SHA deliberately.
#    * Requires the Dependency Graph feature enabled on the repo (default-on
#      for public repos; enable under Settings -> Advanced Security for
#      private repos). If the export step 404s, that's the usual cause.
# =============================================================================

name: Sign SBOM (keyless, workload identity)

on:
  workflow_dispatch:        # manual trigger only

permissions:
  id-token: write           # required: mint OIDC token for keyless signing
  contents: read            # required: GITHUB_TOKEN reads the SBOM export

jobs:
  sign-sbom:
    runs-on: ubuntu-latest
    steps:
      # 1. Export the SBOM from GitHub's Dependency Graph. The API returns
      #    {"sbom": {...}}, so unwrap the .sbom object with jq.
      - name: Export SBOM from Dependency Graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sSf \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/dependency-graph/sbom" \
            | jq '.sbom' > sbom.spdx.json
          echo "SBOM packages: $(jq '.packages | length' sbom.spdx.json)"

      # 2. Install cosign (pinned to commit SHA for supply-chain safety).
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # 3. Keyless sign. cosign auto-detects the ambient GitHub OIDC token;
      #    --yes skips the interactive confirmation. Produces a detached DSSE
      #    attestation bundle — the original JSON is left unchanged.
      - name: Sign SBOM (keyless)
        run: |
          cosign attest-blob \
            --predicate sbom.spdx.json \
            --type spdxjson \
            --bundle sbom.spdx.json.sigstore.json \
            --new-bundle-format \
            --yes \
            sbom.spdx.json

      # 4. Publish the SBOM and its signature bundle as a downloadable artifact.
      - name: Upload signed SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: signed-sbom
          path: |
            sbom.spdx.json
            sbom.spdx.json.sigstore.json
          if-no-files-found: error
